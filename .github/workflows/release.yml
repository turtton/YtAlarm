name: Release apks

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    if: ${{ github.repository_owner == 'turtton' }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: set up JDK 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-disabled: true

      - name: Build apk
        run: ./gradlew clean assembleRelease

      - name: Rename apks
        run: |
          cd app/build/outputs/apk/release
          ls | sed -n 's/\(.*\)-unsigned.apk/mv \0 \1.apk/p' | sh

      - name: Get buildTools version
        id: buildTools
        run: |
          V=$(grep -i "compileSdk = \"\(.*\)\"" gradle/libs.versions.toml | sed -e "s/compileSdk = \"\(.*\)\"/\1.0.0/")
          echo "Detected version $V"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Sign apk
        uses: ilharp/sign-android-release@13dd52242698526f951aa8bb8696204f6fea702a # v2.0.0
        id: sign_app
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.APK_SIGNING_KEY }}
          keyAlias: ${{ secrets.APK_SIGNING_ALIAS }}
          keyStorePassword: ${{ secrets.APK_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.APK_KEY_PASSWORD }}
          buildToolsVersion: ${{ steps.buildTools.outputs.version }}

      - name: Compose release body
        id: body
        env:
          REF_NAME: ${{ github.ref_name }}
        # language=bash
        run: |
          version="${REF_NAME#v}"
          IFS='.' read -r major minor patch <<< "$version"
          # changelog filename = major*10000 + minor*100 + patch (matches versionCode of the x86_64 build minus 4).
          changelog_id=$((major * 10000 + minor * 100 + patch))
          changelog_path="fastlane/metadata/android/en-US/changelogs/${changelog_id}.txt"
          {
            echo 'body<<__BODY_EOF__'
            if [ -f "$changelog_path" ]; then
              cat "$changelog_path"
              echo
            fi
            echo '<a href="https://f-droid.org/packages/net.turtton.ytalarm">'
            echo '    <img src="https://fdroid.gitlab.io/artwork/badge/get-it-on.png" alt="Get it on F-Droid" height="80">'
            echo '</a>'
            echo '__BODY_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Upload to artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Signed app bundle
          path: app/build/outputs/apk/release/*-release-signed.apk
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          body: ${{ steps.body.outputs.body }}
          generate_release_notes: true
          draft: true
          files: app/build/outputs/apk/release/*-release-signed.apk
          fail_on_unmatched_files: true
